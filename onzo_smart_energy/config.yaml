name: Onzo Smart Energy Meter
version: 1.0.6
slug: onzo_smart_energy
description: Auto-discover one or more Onzo USB energy meters in Home Assistant
url: https://github.com/iuginP/hassio-addons/tree/main/onzo_smart_energy
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
usb: true
devices:
  - /dev/hidraw0
services:
  - mqtt:need
options:
  vid: 04d8
  pid: 003f
  scan_interval: 10
  poll_interval: 2
  meters: []
schema:
  vid: match(^[0-9a-fA-F]{4}$)
  pid: match(^[0-9a-fA-F]{4}$)
  scan_interval: int(5,300)
  poll_interval: int(1,60)
  meters:
    - serial: str
      name: str
