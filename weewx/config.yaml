name: WeeWX
version: 1.1.0
slug: weewx
description: Run WeeWX weather station software inside Home Assistant OS
url: https://github.com/homila/hassio-addons/tree/main/weewx
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
usb: true
uart: true
ports:
  80/tcp: 8080
ports_description:
  80/tcp: WeeWX generated weather reports
webui: http://[HOST]:[PORT:80]/
map:
  - type: addon_config
    read_only: false
options:
  driver: weewx.drivers.simulator
  units: metric
  location: Home Assistant
  latitude: 0.0
  longitude: 0.0
  altitude: 0
  altitude_unit: meter
schema:
  driver: str
  units: list(us|metric|metricwx)
  location: str
  latitude: float(-90,90)
  longitude: float(-180,180)
  altitude: int
  altitude_unit: list(meter|foot)
panel_icon: mdi:weather-partly-cloudy
panel_title: WeeWX
